type Board
  @model
  @auth(
    rules: [
      { allow: public, operations: [read], provider: iam }
      { allow: owner }
    ]
  ) {
  id: ID!
  name: String!
  messages: [Message] @hasMany
}

type Message
  @model
  @auth(
    rules: [
      { allow: public, operations: [read], provider: iam }
      { allow: owner }
    ]
  ) {
  id: ID!
  text: String!
  board: Board @belongsTo
  replyTo: String
}
